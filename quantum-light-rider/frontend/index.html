<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Li-Ri</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
            <h1>⚡ QUANTUM LIGHT RIDER</h1>
            <div style="display: flex; gap: 0.8rem; align-items: center;">
                <div class="slider-container">
                    <label for="fadeSlider">TRAIL</label>
                    <input type="range" id="fadeSlider" min="0.001" max="0.2" step="0.001" value="0.02">
                </div>
                <button id="saveBtn">📸 SAVE</button>
                <button id="resetBtn">⟳ RESET WALK</button>
            </div>
        </div>
        <canvas id="quantumCanvas" width="800" height="500"></canvas>
        <div class="info-panel">
            <span id="sourceStatus">⚡ CURBy Quantum DIRNG</span>
            <span id="pulseId">—</span>
            <span id="bytesUsed">0 bytes</span>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
